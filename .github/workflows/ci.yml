name: validation, Build & Release

on:
  push:
#    tags:
#      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  validate:
    name: Validate Codebase
    runs-on: windows-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore Dependencies
        run: dotnet restore

      - name: Verify Formatting
        run: dotnet format --verify-no-changes --verbosity minimal

      - name: Build Debug
        run: dotnet build --no-restore -warnaserror

      - name: Run Tests
        run: dotnet test --no-build --verbosity normal

  build:
    name: Build (${{ matrix.rid }})
    needs: validate
    runs-on: windows-latest
    strategy:
      matrix:
        rid: [win-x64, win-arm64]
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore Dependencies
        run: dotnet restore src/Winotch/Winotch.csproj

      - name: Publish Standalone Executable
        run: |
          dotnet publish src/Winotch/Winotch.csproj `
            -c Release `
            -r ${{ matrix.rid }} `
            --self-contained true `
            -p:PublishSingleFile=true `
            -p:PublishReadyToRun=true `
            -o ./publish-${{ matrix.rid }}

      - name: Rename Executable
        shell: pwsh
        run: |
          Rename-Item -Path "./publish-${{ matrix.rid }}/Winotch.exe" -NewName "Winotch-${{ matrix.rid }}.exe"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Winotch-${{ matrix.rid }}
          path: ./publish-${{ matrix.rid }}/Winotch-${{ matrix.rid }}.exe

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts
          merge-multiple: true

      - name: Determine Tag Name
        id: get_tag
        shell: bash
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            echo "tag=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          else
            echo "tag=manual-${{ github.sha }}" >> $GITHUB_OUTPUT
          fi

      - name: Create Release and Upload Assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.get_tag.outputs.tag }}
          name: Release ${{ steps.get_tag.outputs.tag }}
          files: |
            ./artifacts/Winotch-win-x64.exe
            ./artifacts/Winotch-win-arm64.exe
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
